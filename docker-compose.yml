version: "3.8"

services:
  adv_3team_db:
    image: pgvector/pgvector:pg16
    container_name: adv_3team_db
    restart: always

    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - "./database/postgre_data:/var/lib/postgresql/data"
      - "./database/init:/docker-entrypoint-initdb.d"

    networks:
      - youth_network

networks:
  youth_network:
    driver: bridge
